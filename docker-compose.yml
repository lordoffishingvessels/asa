    environment:
      <<: *common-env

      # Basic server identity
      SERVER_NAME: '"OCB-ASA-Ragnarok"'
      MAP: "Ragnarok_WP"

      # Port configuration used by the server internally
      GAME_PORT: "7787"
      QUERY_PORT: "27025"
      RCON_PORT: "27030"

    volumes:
      # Persistent game server data
      - /home/lord/ark-data-ragnarok/server:/ark-server/server

      # Log output
      - /home/lord/ark-data-ragnarok/logs:/ark-server/logs

      # Backup storage
      - /home/lord/ark-data-ragnarok/backups:/ark-server/backups

      # Shared cluster data for map transfers
      - /home/lord/ark-cluster:/ark-server/cluster

  # ----------------------------
  # ARK SA - Extinction
  # ----------------------------
  ark-sa-extinction:
    image: johnnyknighten/ark-sa-server:latest
    container_name: ark-sa-extinction
    restart: unless-stopped

    ports:
      # Main game ports
      - "7797:7797/udp"
      - "7798:7798/udp"

      # Steam query port
      - "27035:27035/udp"

      # RCON management port
      - "27040:27040/tcp"

    environment:
