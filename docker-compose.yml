      # Basic server identity
      SERVER_NAME: '"OCB-ASA-Ragnarok"'
      MAP: "Ragnarok_WP"

      # Port configuration used by the server internally
      GAME_PORT: "7779"
      QUERY_PORT: "27016"
      RCON_PORT: "27021"

    volumes:
      # Persistent game server data
      - /home/lord/ark-data-ragnarok/server:/ark-server/server

      # Log output
      - /home/lord/ark-data-ragnarok/logs:/ark-server/logs

      # Backup storage
      - /home/lord/ark-data-ragnarok/backups:/ark-server/backups

      # Shared cluster data for map transfers
      - /home/lord/ark-cluster:/ark-server/cluster

  # ----------------------------
  # ARK SA - Extinction
  # ----------------------------
  ark-sa-extinction:
